              <div x-data="heroCarousel" class="mb-8">
                <!-- Hero image carousel -->
                <div class="relative flex items-start aspect-video w-full" x-ref="imageCarousel">
                  <!-- Static LCP slide: discoverable in initial HTML before Alpine hydrates -->
                  <div class="text-center w-full" :class="active === 0 ? '' : 'hidden'">
                    <div class="relative inline-flex justify-center mb-4 w-full">
                      <picture>
                        <source srcset="images/2024-11-30-inner-6.webp" type="image/webp" />
                        <img class="w-full rounded-3xl" src="images/2024-11-30-inner-6.jpg" width="768" height="432"
                          alt="Participants at the third UpGrade Mobility Winter School" fetchpriority="high" />
                      </picture>
                    </div>
                  </div>
                  <!-- Alpine.js template for slides 2–8: https://github.com/alpinejs/alpine#x-for -->
                  <template x-for="(item, index) in items" :key="index">
                    <div x-show="active === index && index !== 0" class="text-center absolute inset-0"
                      x-transition:enter="transition ease-in-out duration-500 transform order-first"
                      x-transition:enter-start="opacity-0 scale-98" x-transition:enter-end="opacity-100 scale-100"
                      x-transition:leave="transition ease-out duration-300 transform absolute"
                      x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-98">
                      <div class="relative inline-flex justify-center mb-4 w-full">
                        <picture>
                          <source
                            :srcset="active === index && index !== 0 ? 'images/' + item.img.replace(/\.jpg$/i, '.webp') : null"
                            type="image/webp" />
                          <img class="w-full rounded-3xl"
                            :src="active === index && index !== 0 ? 'images/' + item.img : null"
                            width="768" height="432" :alt="item.alt || ''" loading="lazy" />
                        </picture>
                      </div>
                    </div>
                  </template>
                </div>

                <!-- Bullets -->
                <div class="flex justify-center mt-6">
                  <!-- Alpine.js template for bullets: https://github.com/alpinejs/alpine#x-for -->
                  <template x-for="(item, index) in items" :key="index">
                    <button
                      type="button"
                      class="carousel-bullet group"
                      @click="active = index; stopAutorotate();"
                      :aria-label="'Go to slide ' + (index + 1) + ' of ' + items.length"
                      :aria-current="active === index ? 'true' : 'false'">
                      <span
                        class="block w-2 h-2 rounded-full group-hover:bg-gray-400 transition duration-150 ease-in-out"
                        :class="active === index ? 'bg-gray-200' : 'bg-gray-500'"></span>
                    </button>
                  </template>
                </div>
              </div>
