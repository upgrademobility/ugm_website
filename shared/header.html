<header class="fixed w-full z-30 md:bg-opacity-90 transition duration-300 ease-in-out" x-data="siteHeader"
  @scroll.window="updateScrollState" :class="{ 'bg-black backdrop-blur-sm shadow-lg' : !isAtTop }">
  <div class="max-w-6xl mx-auto px-4 sm:px-6">
    <div class="flex items-center justify-between h-16 md:h-24">
      <!-- Site branding -->
      <div class="shrink-0 mr-4">
        <a class="block" href="/index.html" aria-label="KIT">
          <img class="w-20 sm:w-32 h-auto" src="/images/kit-logo.svg" width="132" height="60" alt="KIT" />
        </a>
      </div>

      <!-- Desktop navigation -->
      <nav class="hidden md:flex md:grow">
        <ul class="flex grow justify-center flex-wrap items-center">
          <li>
            <a class="text-gray-300 hover:text-gray-200 px-4 py-2 flex items-center transition duration-150 ease-in-out"
              href="/index.html">About</a>
          </li>
          <li>
            <a class="text-gray-300 hover:text-gray-200 px-4 py-2 flex items-center transition duration-150 ease-in-out"
              href="/index.html#news">News</a>
          </li>
          <li>
            <a class="text-gray-300 hover:text-gray-200 px-4 py-2 flex items-center transition duration-150 ease-in-out"
              href="/pages/members.html">Members</a>
          </li>
          <li>
            <a class="text-gray-300 hover:text-gray-200 px-4 py-2 flex items-center transition duration-150 ease-in-out"
              href="/pages/program.html">Program</a>
          </li>
          <li>
            <a class="text-gray-300 hover:text-gray-200 px-4 py-2 flex items-center transition duration-150 ease-in-out"
              href="/pages/winterschool.html">Winter School</a>
          </li>
          <li>
            <a id="application-desktop" class="btn-sm text-gray-900 bg-kitgreen-600 hover:bg-kitgreen-700 ml-3"
              href="/index.html#application">Application</a>
          </li>
        </ul>
      </nav>

      <!-- Mobile menu -->
      <div class="flex md:hidden" x-data="{ expanded: false }">
        <button class="hamburger" :class="{ 'active': expanded }" @click.stop="expanded = !expanded"
          aria-controls="mobile-nav" :aria-expanded="expanded">
          <span class="sr-only">Menu</span>
          <svg class="w-6 h-6 fill-current text-gray-300 hover:text-gray-200 transition duration-150 ease-in-out"
            viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect y="4" width="24" height="2" rx="1" />
            <rect y="11" width="24" height="2" rx="1" />
            <rect y="18" width="24" height="2" rx="1" />
          </svg>
        </button>

        <nav id="mobile-nav"
          class="absolute top-full z-20 left-0 w-full px-4 sm:px-6 overflow-hidden transition-all duration-300 ease-in-out"
          x-ref="mobileNav"
          :style="expanded ? 'max-height: ' + $refs.mobileNav.scrollHeight + 'px; opacity: 1' : 'max-height: 0; opacity: .8'"
          @click.outside="expanded = false" @keydown.escape.window="expanded = false" x-cloak>
          <ul class="bg-gray-800 px-4 py-2">
            <li>
              <a class="flex text-gray-300 hover:text-gray-200 py-2" href="/index.html">About</a>
            </li>
            <li>
              <a class="flex text-gray-300 hover:text-gray-200 py-2" href="/index.html#news">News</a>
            </li>
            <li>
              <a class="flex text-gray-300 hover:text-gray-200 py-2" href="/pages/members.html">Members</a>
            </li>
            <li>
              <a class="flex text-gray-300 hover:text-gray-200 py-2" href="/pages/program.html">Program</a>
            </li>
            <li>
              <a class="flex text-gray-300 hover:text-gray-200 py-2" href="/pages/winterschool.html">Winter School</a>
            </li>
            <li>
              <a id="application-mobile"
                class="font-medium w-full inline-flex items-center justify-center border border-transparent px-4 py-2 my-2 rounded-sm text-gray-900 bg-kitgreen-600 hover:bg-kitgreen-700 transition duration-150 ease-in-out"
                href="/index.html#application">Application</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </div>
</header>
